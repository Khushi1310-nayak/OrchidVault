<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrchidVault — Study Sanctuary & Music Vault</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8870A3" />
    <script>
      // Suppress Vite HMR WebSocket errors in this environment
      if (typeof window !== 'undefined') {
        const originalError = console.error;
        console.error = (...args) => {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('[vite] failed to connect to websocket') || args[0].includes('WebSocket closed without opened'))) {
            return;
          }
          originalError.apply(console, args);
        };
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
